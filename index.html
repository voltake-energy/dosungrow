<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Monitoring Yuran Sekolah</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Excel Export (SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- PDF Export (jsPDF & AutoTable) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff; /* Soft Blue Background */
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .sidebar-active {
            background-color: #e0f2fe;
            color: #0ea5e9;
            font-weight: 700;
            border-right: 4px solid #0ea5e9;
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* Checkbox Custom Style */
        .custom-checkbox:checked {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
        }
        /* Animation */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Dropdown status styles */
        .status-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- KONFIGURASI PENTING ---
        // 1. Google Sheets ID
        const SHEET_ID = '2PACX-1vTXZgRPcp3xfy3iOPQae01DZd5ODahZWkHwGucWCglxDAeFEXql_VgVVi2JcblgsLfPeLHq7bcuLWLY';
        
        // 2. APPS SCRIPT URL (UNTUK FUNGSI UPDATE/EDIT STATUS VERIFICATION)
        // ** SILA MASUKKAN URL DEPLOYMENT APPS SCRIPT ANDA DI BAWAH INI **
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVA_Fo5f0xTkcfsQOMbrNQwlQo49FYcuBdql6v_Fj2dJMMAcJTQdlh5hSRCTkV7P8qTQ/exec'; 

        // Tab 1: Maklumat Pelajar - GID: 0
        const URL_STUDENTS = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=csv`;
        
        // Tab 2: LOG YURAN BULANAN - GID: 2127535471
        const URL_FEES_MONTHLY = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=2127535471&single=true&output=csv`;

        // Tab 3: LOG YURAN PENDAFTARAN - GID: 1247491467
        const URL_FEES_REGISTRATION = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=1247491467&single=true&output=csv`;

        // --- CONFIG UNTUK DATABASE EXPORT ---
        const EXPORT_COLUMNS = [
            { id: 'Nama', label: 'Nama Pelajar' },
            { id: 'IC', label: 'No. KP / MyKid' },
            { id: 'Jantina', label: 'Jantina' },
            { id: 'Kelas', label: 'Kelas' },
            { id: 'Nama Waris', label: 'Nama Waris' },
            { id: 'No Tel Waris', label: 'No. Tel Waris' },
            { id: 'Alamat', label: 'Alamat' },
            { id: 'totalPaid', label: 'Jumlah Telah Bayar (RM)' },
            { id: 'balReg', label: 'Baki Pendaftaran (RM)' },
            { id: 'balMonthly', label: 'Baki Bulanan (RM)' },
            { id: 'currentBalance', label: 'Jumlah Baki Hutang (RM)' },
            { id: 'status_text', label: 'Status Akaun' }
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    const iconName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
                    const iconNode = window.lucide.icons[iconName];

                    if (iconNode && iconRef.current) {
                        iconRef.current.innerHTML = '';
                        if (window.lucide.createElement) {
                            const svgElement = window.lucide.createElement(iconNode);
                            svgElement.setAttribute('width', size);
                            svgElement.setAttribute('height', size);
                            svgElement.setAttribute('stroke-width', 2);
                            if (className) {
                                const existingClass = svgElement.getAttribute('class') || '';
                                svgElement.setAttribute('class', `${existingClass} ${className}`.trim());
                            }
                            iconRef.current.appendChild(svgElement);
                        }
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const Loading = () => (
            <div className="flex flex-col items-center justify-center h-screen bg-sky-50">
                <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-sky-500 mb-4"></div>
                <h2 className="text-xl font-bold text-sky-700 animate-pulse">Sedang Memuat Data Sekolah...</h2>
                <p className="text-sky-500 text-sm mt-2">Menghubungkan ke 3 Tab Google Sheets</p>
            </div>
        );

        const ErrorScreen = ({ message, onRetry }) => (
            <div className="flex flex-col items-center justify-center h-screen bg-red-50 text-center p-4">
                <div className="text-red-500 mb-4"><Icon name="alert-triangle" size={64} /></div>
                <h2 className="text-2xl font-bold text-red-700 mb-2">Gagal Memuat Data</h2>
                <p className="text-red-600 mb-6 max-w-md">{message}</p>
                <button onClick={onRetry} className="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-full font-semibold transition shadow-lg">
                    Cuba Lagi
                </button>
            </div>
        );

        const StatCard = ({ title, value, subtext, color, iconName, iconColorClass }) => (
            <div className={`glass-card p-6 rounded-2xl shadow-sm border-l-4 ${color} transition hover:shadow-md`}>
                <div className="flex justify-between items-start">
                    <div>
                        <p className="text-gray-500 text-sm font-semibold uppercase tracking-wider">{title}</p>
                        <h3 className="text-3xl font-bold text-gray-800 mt-1">{value}</h3>
                        {subtext && <p className="text-xs text-gray-400 mt-2">{subtext}</p>}
                    </div>
                    <div className={`p-3 rounded-xl bg-white shadow-sm text-${iconColorClass}`}>
                        <Icon name={iconName} size={24} className={`text-${iconColorClass}`} />
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [students, setStudents] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [updatingStatus, setUpdatingStatus] = useState(null); 
            
            const [exportCols, setExportCols] = useState(EXPORT_COLUMNS.map(c => c.id));
            const [filters, setFilters] = useState({ search: '', class: 'Semua', month: 'Semua', status: 'Semua', type: 'Semua' });

            // Helper function to parse dates correctly for sorting (DD/MM/YYYY HH:mm:ss)
            const parseDateString = (dateStr) => {
                if (!dateStr) return 0;
                try {
                    const [datePart, timePart] = dateStr.split(' ');
                    if (!datePart) return 0;
                    const [day, month, year] = datePart.split('/');
                    const [hour, min, sec] = (timePart || '00:00:00').split(':');
                    return new Date(year, month - 1, day, hour, min, sec).getTime();
                } catch (e) {
                    return 0; // Fallback if parsing fails
                }
            };

            const fetchData = async () => {
                setLoading(true);
                setError(null);
                try {
                    const fetchCsv = (url) => new Promise((resolve, reject) => {
                        Papa.parse(url, { download: true, header: true, skipEmptyLines: true, complete: (r) => resolve(r.data), error: (e) => reject(e) });
                    });

                    const [studentRes, monthlyRes, regRes] = await Promise.all([
                        fetchCsv(URL_STUDENTS),
                        fetchCsv(URL_FEES_MONTHLY),
                        fetchCsv(URL_FEES_REGISTRATION)
                    ]);

                    const cleanKeys = (data) => data.map(item => {
                        const clean = {};
                        Object.keys(item).forEach(key => clean[key.trim()] = item[key]);
                        return clean;
                    });

                    const cleanStudents = cleanKeys(studentRes);
                    const cleanMonthly = cleanKeys(monthlyRes).map(t => ({...t, _type: 'Bulanan'}));
                    const cleanReg = cleanKeys(regRes).map(t => ({...t, _type: 'Pendaftaran'}));

                    const allTransactions = [...cleanMonthly, ...cleanReg];
                    
                    // SORTING LOGIC: Newest to Oldest explicitly using Custom Date Parser
                    allTransactions.sort((a, b) => parseDateString(b.Timestamp) - parseDateString(a.Timestamp));

                    setStudents(cleanStudents);
                    setTransactions(allTransactions);
                } catch (err) {
                    console.error("CSV Error:", err);
                    setError("Gagal membaca data dari Google Sheet. Pastikan sheet 'Published to Web'.");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const updateStatus = async (tx, newStatus) => {
                if (!APPS_SCRIPT_URL) {
                    alert("Sila tetapkan APPS_SCRIPT_URL dalam kod index.html dahulu untuk membolehkan fungsi Edit!");
                    return;
                }
                
                const txId = tx.Timestamp + tx.NAMA;
                setUpdatingStatus(txId);

                try {
                    const payload = {
                        action: 'UPDATE_STATUS',
                        sheetType: tx._type,
                        timestamp: tx.Timestamp,
                        ic: tx.IC || '',
                        nama: tx.NAMA,
                        newStatus: newStatus
                    };

                    const updatedTransactions = transactions.map(t => {
                        if (t.Timestamp === tx.Timestamp && t.NAMA === tx.NAMA) {
                            return { ...t, VERIFICATION: newStatus };
                        }
                        return t;
                    });
                    setTransactions(updatedTransactions);

                    const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.json();
                    
                    if (result.result !== 'success') throw new Error(result.message || "Gagal kemas kini di server");
                    console.log("Status berjaya dikemaskini");
                } catch (err) {
                    console.error("Kemas kini gagal:", err);
                    alert("Gagal mengemaskini status: " + err.message);
                    fetchData(); 
                } finally {
                    setUpdatingStatus(null);
                }
            };

            const studentData = useMemo(() => {
                return students.map(student => {
                    const studentTxs = transactions.filter(t => t['IC'] === student['IC']);
                    const monthlyTxs = studentTxs.filter(t => t._type === 'Bulanan');
                    const regTxs = studentTxs.filter(t => t._type === 'Pendaftaran');

                    let balMonthly = 0;
                    if (monthlyTxs.length > 0) {
                        const latest = monthlyTxs.sort((a, b) => parseDateString(b['Timestamp']) - parseDateString(a['Timestamp']))[0];
                        balMonthly = parseFloat((latest['BAKI'] || '0').replace(/[^0-9.-]+/g,""));
                    } else {
                        balMonthly = parseFloat((student['Yuran Bulanan'] || '0').replace(/[^0-9.-]+/g,""));
                    }

                    let balReg = 0;
                    if (regTxs.length > 0) {
                         const latest = regTxs.sort((a, b) => parseDateString(b['Timestamp']) - parseDateString(a['Timestamp']))[0];
                         balReg = parseFloat((latest['BAKI'] || '0').replace(/[^0-9.-]+/g,""));
                    } else {
                        balReg = parseFloat((student['Yuran Pendaftaran'] || '0').replace(/[^0-9.-]+/g,""));
                    }

                    const totalPaid = studentTxs.reduce((sum, tx) => {
                        const amount = parseFloat((tx['JUMLAH BAYARAN'] || '0').replace(/[^0-9.-]+/g,""));
                        return sum + (isNaN(amount) ? 0 : amount);
                    }, 0);

                    const currentBalance = (isNaN(balMonthly) ? 0 : balMonthly) + (isNaN(balReg) ? 0 : balReg);

                    return {
                        ...student,
                        transactions: studentTxs,
                        totalPaid: totalPaid,
                        currentBalance: currentBalance,
                        balMonthly: isNaN(balMonthly) ? 0 : balMonthly,
                        balReg: isNaN(balReg) ? 0 : balReg,
                        status_text: currentBalance > 0 ? 'Tertunggak' : 'Selesai'
                    };
                });
            }, [students, transactions]);

            const filteredStudents = useMemo(() => {
                return studentData.filter(s => {
                    const matchSearch = (s['Nama'] || '').toLowerCase().includes(filters.search.toLowerCase()) || (s['IC'] || '').includes(filters.search);
                    const matchClass = filters.class === 'Semua' || s['Kelas'] === filters.class;
                    const matchMonth = filters.month === 'Semua' || s.transactions.some(t => t['BULAN'] === filters.month);

                    let matchStatus = true;
                    let balanceToCheck = s.currentBalance;
                    if (filters.type === 'Pendaftaran') balanceToCheck = s.balReg;
                    if (filters.type === 'Bulanan') balanceToCheck = s.balMonthly;

                    if (filters.status === 'Tertunggak') matchStatus = balanceToCheck > 0;
                    if (filters.status === 'Selesai') matchStatus = balanceToCheck <= 0;
                    
                    return matchSearch && matchClass && matchMonth && matchStatus;
                });
            }, [studentData, filters]);

            const stats = useMemo(() => {
                const totalStudents = studentData.length;
                const totalOutstanding = studentData.reduce((sum, student) => sum + (student.currentBalance > 0 ? student.currentBalance : 0), 0);
                const totalCollection = transactions.reduce((sum, tx) => {
                      const amount = parseFloat((tx['JUMLAH BAYARAN'] || '0').replace(/[^0-9.-]+/g,""));
                      return sum + (isNaN(amount) ? 0 : amount);
                }, 0);
                
                const collectionByMonth = {};
                transactions.forEach(tx => {
                    let month = tx['BULAN'];
                    if (!month || month.trim() === '') month = 'Yuran Pendaftaran';
                    const amount = parseFloat((tx['JUMLAH BAYARAN'] || '0').replace(/[^0-9.-]+/g,""));
                    if (!collectionByMonth[month]) collectionByMonth[month] = 0;
                    collectionByMonth[month] += (isNaN(amount) ? 0 : amount);
                });

                return { totalStudents, totalCollection, totalOutstanding, collectionByMonth };
            }, [studentData, transactions]);

            const classes = useMemo(() => ['Semua', ...Array.from(new Set(students.map(s => s['Kelas']).filter(Boolean)))], [students]);
            const months = useMemo(() => ['Semua', ...Array.from(new Set(transactions.map(t => t['BULAN']).filter(Boolean)))], [transactions]);

            const formatRM = (val) => "RM " + (parseFloat(val) || 0).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const getPhotoUrl = (url) => {
                if (!url) return null;
                if (url.includes('drive.google.com') || url.includes('docs.google.com')) {
                    const match = url.match(/(?:\/d\/|id=)([-\w]+)/);
                    if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}`;
                }
                return url;
            };

            const sendWhatsAppReminder = (student) => {
                const phone = student['No Tel Waris'];
                if (!phone) { alert("Nombor telefon waris tiada."); return; }
                let cleanPhone = phone.toString().replace(/[^0-9]/g, '');
                if (cleanPhone.startsWith('0')) cleanPhone = '60' + cleanPhone.substring(1);

                let message = "";
                if (student.currentBalance > 0) {
                    message = `Assalamualaikum dan salam sejahtera En/Cik ${student['Nama Waris'] || ''}\n\nBerikut merupakan baki tertunggak yang perlu dibayar bagi *${student.Nama}*:\n\n*Jumlah Tertunggak: ${formatRM(student.currentBalance)}*\n------------------------------\nPecahan Baki:\n• Baki Pendaftaran: ${formatRM(student.balReg)}\n• Baki Bulanan: ${formatRM(student.balMonthly)}\n\nMohon jelaskan bayaran secepat mungkin. Terima kasih.`;
                } else {
                    message = `Assalamualaikum dan salam sejahtera En/Cik ${student['Nama Waris'] || ''}\n\nPihak Tadika ingin merakamkan ucapan *TAHNIAH dan TERIMA KASIH* atas komitmen tuan/puan menyelesaikan pembayaran yuran bagi anak anda, *${student.Nama}*.\n\nSokongan anda amat kami hargai. Terima kasih.`;
                }
                window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`, '_blank');
            };

            const toggleColumn = (id) => exportCols.includes(id) ? setExportCols(exportCols.filter(col => col !== id)) : setExportCols([...exportCols, id]);
            const toggleAllColumns = () => exportCols.length === EXPORT_COLUMNS.length ? setExportCols([]) : setExportCols(EXPORT_COLUMNS.map(c => c.id));

            const generateExportData = () => {
                return filteredStudents.map(student => {
                    const row = {};
                    EXPORT_COLUMNS.forEach(col => {
                        if (exportCols.includes(col.id)) {
                            if (['totalPaid', 'balReg', 'balMonthly', 'currentBalance'].includes(col.id)) {
                                row[col.label] = (parseFloat(student[col.id]) || 0).toFixed(2);
                            } else {
                                row[col.label] = student[col.id] || '-';
                            }
                        }
                    });
                    return row;
                });
            };

            const downloadExcel = () => {
                const data = generateExportData();
                if (data.length === 0) { alert("Tiada data untuk dimuat turun."); return; }
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Database Pelajar");
                XLSX.writeFile(wb, "Database_Pelajar_Tadika_Pintar.xlsx");
            };

            const downloadPDF = () => {
                const data = generateExportData();
                if (data.length === 0) { alert("Tiada data untuk dimuat turun."); return; }
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape' });
                const headers = EXPORT_COLUMNS.filter(c => exportCols.includes(c.id)).map(c => c.label);
                const rows = data.map(obj => Object.values(obj));
                doc.setFontSize(18);
                doc.text("Database Pelajar - Tadika Pintar", 14, 20);
                doc.setFontSize(10);
                doc.text(`Tarikh Dijana: ${new Date().toLocaleDateString('ms-MY')}`, 14, 28);
                doc.text(`Jumlah Rekod: ${rows.length}`, 14, 33);
                doc.autoTable({ head: [headers], body: rows, startY: 40, theme: 'grid', styles: { fontSize: 8 }, headStyles: { fillColor: [14, 165, 233] } });
                doc.save("Database_Pelajar_Tadika_Pintar.pdf");
            };

            useEffect(() => {
                if (view === 'dashboard' && !loading && document.getElementById('feesChart')) {
                    const ctx = document.getElementById('feesChart').getContext('2d');
                    if (window.myChart) window.myChart.destroy();
                    const labels = Object.keys(stats.collectionByMonth);
                    const data = Object.values(stats.collectionByMonth);
                    window.myChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Jumlah Kutipan (RM)',
                                data: data,
                                backgroundColor: 'rgba(14, 165, 233, 0.6)',
                                borderColor: 'rgba(14, 165, 233, 1)',
                                borderWidth: 1,
                                borderRadius: 8
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } }
                    });
                }
            }, [view, stats, loading]);

            if (loading) return <Loading />;
            if (error) return <ErrorScreen message={error} onRetry={fetchData} />;

            return (
                <div className="flex min-h-screen">
                    <aside className="w-64 bg-white hidden md:flex flex-col border-r border-slate-100 fixed h-full z-10">
                        <div className="p-6 flex items-center gap-3">
                            <div className="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-sky-200">
                                <Icon name="graduation-cap" className="text-white" size={24} />
                            </div>
                            <div>
                                <h1 className="font-bold text-slate-800 text-lg">Tadika Pintar</h1>
                                <p className="text-xs text-slate-400">Sistem Pengurusan Yuran</p>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => { setView('dashboard'); setSelectedStudent(null); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'dashboard' ? 'sidebar-active' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="layout-dashboard" size={20} /> <span>Dashboard</span>
                            </button>
                            <button onClick={() => { setView('students'); setSelectedStudent(null); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'students' ? 'sidebar-active' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="users" size={20} /> <span>Senarai Pelajar</span>
                            </button>
                            <button onClick={() => { setView('transactions'); setSelectedStudent(null); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'transactions' ? 'sidebar-active' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="credit-card" size={20} /> <span>Rekod Transaksi</span>
                            </button>
                            <button onClick={() => { setView('database'); setSelectedStudent(null); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'database' ? 'sidebar-active' : 'text-slate-500 hover:bg-slate-50'}`}>
                                <Icon name="database" size={20} /> <span>Database Pelajar</span>
                            </button>
                        </nav>

                        <div className="p-6">
                            <div className="bg-gradient-to-br from-indigo-500 to-purple-500 rounded-xl p-4 text-white shadow-lg shadow-indigo-200 cursor-pointer hover:shadow-xl transition" onClick={fetchData} title="Klik untuk refresh data">
                                <p className="text-xs opacity-80 mb-1 flex justify-between items-center">
                                    Status Sistem <Icon name="refresh-cw" size={14} className="opacity-70 hover:opacity-100" />
                                </p>
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
