<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DO Generator — Sungrow</title>
<style>
  :root{
    --navy:#16233F;
    --navy-2:#1F3358;
    --accent:#D6862B;
    --accent-2:#B96F1E;
    --bg:#F4F5F7;
    --card:#FFFFFF;
    --line:#E2E5EA;
    --text:#1B2230;
    --text-dim:#6B7280;
    --danger:#C0392B;
    --ok:#1E7B4D;
    --radius:10px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    padding:24px 16px 60px;
  }
  .wrap{max-width:820px;margin:0 auto;}

  header{
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    border-radius:var(--radius);
    padding:22px 24px;
    color:#fff;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    right:-40px;top:-40px;
    width:160px;height:160px;
    border:2px dashed rgba(255,255,255,0.15);
    border-radius:50%;
  }
  header h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.2px;}
  header p{margin:4px 0 0;font-size:12.5px;color:#C9D2E3;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:16px;
  }
  .card h2{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.6px;
    color:var(--accent-2);
    margin:0 0 14px;
    padding-bottom:8px;
    border-bottom:1px dashed var(--line);
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  @media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr;}}

  label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--text-dim);
    margin:0 0 5px;
  }
  label .req{color:var(--danger);}
  input[type=text], input[type=date], input[type=number], input[type=tel], textarea, select{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    font-size:14px;
    color:var(--text);
    background:#fff;
    font-family:inherit;
  }
  input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(214,134,43,.15);
  }
  textarea{resize:vertical;min-height:54px;}
  .field{margin-bottom:12px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:600px){.two-col{grid-template-columns:1fr;gap:0;}}
  .subblock h3{
    font-size:12.5px;
    font-weight:700;
    color:var(--navy);
    margin:0 0 10px;
  }

  /* item table */
  .item-row{
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px;
    margin-bottom:10px;
    position:relative;
    background:#FBFBFC;
  }
  .item-row .item-tag{
    position:absolute;
    top:-9px;left:10px;
    background:var(--navy);
    color:#fff;
    font-size:10.5px;
    font-weight:700;
    padding:2px 8px;
    border-radius:20px;
  }
  .item-grid{
    display:grid;
    grid-template-columns:1.2fr 2fr .8fr .9fr auto;
    gap:8px;
    align-items:end;
  }
  @media(max-width:700px){.item-grid{grid-template-columns:1fr 1fr;}}
  .item-grid label{font-size:10.5px;margin-bottom:3px;}
  .btn-remove{
    background:#fff;
    border:1px solid var(--danger);
    color:var(--danger);
    border-radius:7px;
    height:36px;
    width:36px;
    cursor:pointer;
    font-size:16px;
    line-height:1;
  }
  .btn-remove:hover{background:#FDEDEB;}
  .btn-remove:disabled{opacity:.35;cursor:not-allowed;}

  .btn-add{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#fff;
    border:1.5px dashed var(--accent);
    color:var(--accent-2);
    font-weight:700;
    font-size:13px;
    padding:9px 14px;
    border-radius:7px;
    cursor:pointer;
    margin-top:2px;
  }
  .btn-add:hover{background:#FDF3E7;}

  .actions{
    display:flex;
    gap:10px;
    align-items:center;
    margin-top:18px;
  }
  .btn-submit{
    flex:1;
    background:var(--navy);
    color:#fff;
    border:none;
    padding:14px;
    font-size:15px;
    font-weight:700;
    border-radius:8px;
    cursor:pointer;
    letter-spacing:.2px;
  }
  .btn-submit:hover{background:var(--navy-2);}
  .btn-submit:disabled{opacity:.6;cursor:not-allowed;}

  .msg{
    border-radius:8px;
    padding:12px 14px;
    font-size:13.5px;
    margin-top:14px;
    display:none;
  }
  .msg.err{background:#FDECEA;color:var(--danger);border:1px solid #F5C6C1;display:block;}
  .msg.ok{background:#E9F7EF;color:var(--ok);border:1px solid #B7E4CA;display:block;}

  .result{
    display:none;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px;
    text-align:center;
  }
  .result.show{display:block;}
  .result .tick{
    width:52px;height:52px;border-radius:50%;
    background:#E9F7EF;color:var(--ok);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;margin:0 auto 12px;
  }
  .result h2{font-size:17px;margin:0 0 4px;border:none;padding:0;color:var(--text);text-transform:none;letter-spacing:0;}
  .result p{color:var(--text-dim);font-size:13.5px;margin:0 0 18px;}
  .dl-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .dl-btn{
    text-decoration:none;
    padding:11px 20px;
    border-radius:7px;
    font-weight:700;
    font-size:14px;
  }
  .dl-pdf{background:var(--navy);color:#fff;}
  .dl-xlsx{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
  .again{
    margin-top:20px;
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:13px;
    text-decoration:underline;
    cursor:pointer;
  }

  .spinner{
    width:16px;height:16px;
    border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;
    border-radius:50%;
    display:inline-block;
    animation:spin .7s linear infinite;
    vertical-align:-3px;
    margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>DO Generator — Sungrow Delivery Order</h1>
    <p>Key in maklumat, sistem auto isi template DO &amp; simpan rekod ke database.</p>
  </header>

  <form id="doForm">

    <div class="card">
      <h2>Maklumat DO</h2>
      <div class="grid3">
        <div class="field">
          <label>No. DO <span class="req">*</span></label>
          <input type="text" id="doNo" placeholder="RW2606230802_MA2606230354_JD" required>
        </div>
        <div class="field">
          <label>Tarikh <span class="req">*</span></label>
          <input type="date" id="date" required>
        </div>
        <div class="field">
          <label>APAC Ticket</label>
          <input type="text" id="apacTicket" placeholder="260515024031597">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>From &amp; To</h2>
      <div class="two-col">
        <div class="subblock">
          <h3>From (Penghantar)</h3>
          <div class="field"><label>Nama Syarikat <span class="req">*</span></label>
            <input type="text" id="fromName" required></div>
          <div class="field"><label>Alamat</label>
            <textarea id="fromAddress"></textarea></div>
          <div class="field"><label>ATTN</label>
            <input type="text" id="fromAttn"></div>
          <div class="field"><label>Tel</label>
            <input type="text" id="fromTel"></div>
        </div>
        <div class="subblock">
          <h3>To (Penerima)</h3>
          <div class="field"><label>Nama Syarikat <span class="req">*</span></label>
            <input type="text" id="toName" required></div>
          <div class="field"><label>Alamat</label>
            <textarea id="toAddress"></textarea></div>
          <div class="field"><label>ATTN</label>
            <input type="text" id="toAttn"></div>
          <div class="field"><label>Tel</label>
            <input type="text" id="toTel"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Senarai Barang</h2>
      <div id="itemsContainer"></div>
      <button type="button" class="btn-add" id="addItemBtn">+ Tambah Item</button>
    </div>

    <div class="card">
      <h2>Maklumat Tambahan</h2>
      <div class="grid2">
        <div class="field"><label>Total Carton / Pallet</label>
          <input type="text" id="totalCarton" placeholder="cth: 1 PCS"></div>
        <div class="field"><label>Truck</label>
          <input type="text" id="truck" placeholder="cth: - atau no. plat"></div>
      </div>
      <div class="field"><label>Note</label>
        <textarea id="note" placeholder="Nota tambahan (jika ada)"></textarea></div>
      <div class="field"><label>Nama Pengesah / Signer <span class="req">*</span></label>
        <input type="text" id="signer" placeholder="Nama authorized signer" required></div>
    </div>

    <div class="msg" id="msgBox"></div>

    <div class="actions">
      <button type="submit" class="btn-submit" id="submitBtn">Jana DO &amp; Simpan Rekod</button>
    </div>
  </form>

  <div class="result" id="resultBox">
    <div class="tick">✓</div>
    <h2>DO berjaya dijana</h2>
    <p id="resultDoNo"></p>
    <div class="dl-row">
      <a href="#" id="pdfLink" class="dl-btn dl-pdf" target="_blank" rel="noopener">Muat Turun PDF</a>
      <a href="#" id="xlsxLink" class="dl-btn dl-xlsx" target="_blank" rel="noopener">Muat Turun Excel</a>
    </div>
    <div><button type="button" class="again" id="againBtn">+ Jana DO Baru</button></div>
  </div>

</div>

<script>
// =====================================================================
// TUKAR URL NI lepas deploy Apps Script sebagai Web App
// =====================================================================
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzdE6ALlB6NBH3hWR7Pz3A9ZrSDwRo846ValtCDMOLk-PfEHw7I44M2hafyvpN_lvIdAg/exec';

const UNIT_OPTIONS = ['PCS','UNIT','SET','BOX','PALLET','KG'];
let itemCount = 0;

function addItemRow(prefill){
  itemCount++;
  const idx = itemCount;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.dataset.idx = idx;
  div.innerHTML = `
    <span class="item-tag">Item ${idx}</span>
    <div class="item-grid">
      <div><label>Product Code</label><input type="text" class="f-code" required></div>
      <div><label>Description</label><input type="text" class="f-desc" required></div>
      <div><label>Qty</label><input type="number" class="f-qty" min="1" step="1" required></div>
      <div><label>Unit</label>
        <select class="f-unit" required>
          <option value="">-</option>
          ${UNIT_OPTIONS.map(u=>`<option value="${u}">${u}</option>`).join('')}
        </select>
      </div>
      <button type="button" class="btn-remove" title="Buang item">&times;</button>
    </div>
  `;
  document.getElementById('itemsContainer').appendChild(div);
  div.querySelector('.btn-remove').addEventListener('click', () => {
    div.remove();
    renumberItems();
  });
}

function renumberItems(){
  const rows = document.querySelectorAll('.item-row');
  rows.forEach((row, i) => {
    row.querySelector('.item-tag').textContent = 'Item ' + (i + 1);
  });
  document.querySelectorAll('.btn-remove').forEach(btn => {
    btn.disabled = rows.length <= 1;
  });
}

document.getElementById('addItemBtn').addEventListener('click', () => {
  addItemRow();
  renumberItems();
});

// mula dengan 1 item row + tarikh default hari ini
addItemRow();
renumberItems();
document.getElementById('date').valueAsDate = new Date();

function showMsg(text, type){
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg ' + type;
}

function clearMsg(){
  const box = document.getElementById('msgBox');
  box.className = 'msg';
  box.textContent = '';
}

function collectItems(){
  const rows = document.querySelectorAll('.item-row');
  const items = [];
  for (const row of rows){
    items.push({
      productCode: row.querySelector('.f-code').value.trim(),
      description: row.querySelector('.f-desc').value.trim(),
      qty: row.querySelector('.f-qty').value,
      unit: row.querySelector('.f-unit').value
    });
  }
  return items;
}

document.getElementById('doForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsg();

  if (WEBAPP_URL.indexOf('PASTE_') === 0){
    showMsg('WEBAPP_URL belum diisi dalam kod. Sila deploy Apps Script dulu & update index.html.', 'err');
    return;
  }

  const items = collectItems();
  if (items.length === 0){
    showMsg('Sekurang-kurangnya 1 item diperlukan.', 'err');
    return;
  }
  for (const it of items){
    if (!it.productCode || !it.description || !it.qty || !it.unit){
      showMsg('Sila lengkapkan semua field dalam senarai barang.', 'err');
      return;
    }
  }

  const payload = {
    doNo: document.getElementById('doNo').value.trim(),
    date: document.getElementById('date').value,
    apacTicket: document.getElementById('apacTicket').value.trim(),
    fromName: document.getElementById('fromName').value.trim(),
    fromAddress: document.getElementById('fromAddress').value.trim(),
    fromAttn: document.getElementById('fromAttn').value.trim(),
    fromTel: document.getElementById('fromTel').value.trim(),
    toName: document.getElementById('toName').value.trim(),
    toAddress: document.getElementById('toAddress').value.trim(),
    toAttn: document.getElementById('toAttn').value.trim(),
    toTel: document.getElementById('toTel').value.trim(),
    items: items,
    totalCarton: document.getElementById('totalCarton').value.trim(),
    truck: document.getElementById('truck').value.trim(),
    note: document.getElementById('note').value.trim(),
    signer: document.getElementById('signer').value.trim()
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Sedang jana DO...';

  try {
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const result = await res.json();

    if (result.success){
      document.getElementById('doForm').style.display = 'none';
      document.getElementById('resultDoNo').textContent = 'No. DO: ' + result.doNo;
      document.getElementById('pdfLink').href = result.pdfUrl;
      document.getElementById('xlsxLink').href = result.xlsxUrl;
      document.getElementById('resultBox').classList.add('show');
    } else {
      showMsg(result.error || 'Ralat tidak diketahui.', 'err');
    }
  } catch (err) {
    showMsg('Gagal hubungi server: ' + err.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Jana DO &amp; Simpan Rekod';
  }
});

document.getElementById('againBtn').addEventListener('click', () => {
  document.getElementById('doForm').reset();
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  addItemRow();
  renumberItems();
  document.getElementById('date').valueAsDate = new Date();
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('doForm').style.display = 'block';
  clearMsg();
});
</script>
</body>
</html>
